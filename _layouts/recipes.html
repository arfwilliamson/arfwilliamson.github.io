---
layout: default
---
<article class="recipe-layout">
  <header>
    <h1>{{ page.title }}</h1>
    <p>Prep: {{ page.prep_time }} | Serves: {{ page.servings }}</p>
  </header>

  <div class="recipe-container">
    <aside class="ingredients">
      <h3>Ingredients</h3>
      <ul class="tabular-list">
        {% for item in page.ingredients %}
          <li>{{ item }}</li>
        {% endfor %}
      </ul>
    </aside>

    <div class="instructions">
      <h3>Method</h3>
      {{ content }}
    </div>
  </div>
</article>
