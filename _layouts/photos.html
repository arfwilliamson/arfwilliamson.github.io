---
layout: default
---
<article class="photos-post">
  <header>
    <h1>{{ page.title }}</h1>
    <time>{{ page.date | date: "%B %Y" }}</time>
  </header>

  <!-- This wrapper triggers the 3-column grid for the Markdown images -->
  <div class="photos-post-content">
    {{ content }}
  </div>
</article>
