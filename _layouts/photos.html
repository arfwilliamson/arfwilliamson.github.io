---
layout: default
---
<article class="photos-post">
  <div style="display: flex; justify-content: space-between; align-items: baseline;">
    <h1>{{ page.title }}</h1>
    <span>{{ page.date | date: "%B %Y" }}</span>
  </div>

  <!-- This wrapper triggers the 2-column grid for the Markdown images -->
  <div class="photos-post-content">
    {{ content }}
  </div>
</article>
